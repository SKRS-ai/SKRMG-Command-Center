<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SKRMG | Command Center - Investor Relations</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-black: #010101;
            --vexilla-glow: rgba(0, 123, 255, 0.95);   
            --scribe-glow: rgba(255, 69, 0, 0.95);    
            --autopilot-glow: rgba(50, 205, 50, 0.95); 
            --prompt-glow: rgba(138, 43, 226, 0.95);  
            --skrmg-glow: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            width: 100%; height: 100%;
            background-color: var(--bg-black);
            font-family: 'Inter', sans-serif;
            color: #fff;
            overflow: hidden;
            cursor: crosshair;
        }

        header {
            position: fixed;
            top: 0; width: 100%;
            padding: 20px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(30px);
            border-bottom: 1px solid var(--glass-border);
            background: rgba(0,0,0,0.85);
        }

        .brand-box { display: flex; align-items: center; }
        .brand-logo-small { width: 210px; height: auto; filter: drop-shadow(0 0 15px white); transition: 0.4s; }
        .brand-logo-small:hover { transform: scale(1.05); }

        .nav-links { display: flex; gap: 35px; }
        .nav-links a { 
            text-decoration: none; color: #888; font-size: 0.75rem; 
            font-weight: 900; letter-spacing: 4px; text-transform: uppercase;
            transition: 0.4s ease;
        }
        .nav-links a:hover { color: #fff; text-shadow: 0 0 20px #fff; }

        .hud-status {
            position: fixed;
            bottom: 40px; left: 40px;
            font-size: 0.7rem; color: #444;
            letter-spacing: 3px; line-height: 2.2;
            z-index: 10;
            font-family: monospace;
            text-transform: uppercase;
        }

        .stage {
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            perspective: 2000px;
            background: radial-gradient(circle at center, #0f0f0f 0%, #010101 100%);
            padding-top: 100px; 
        }

        .orbit-wrap {
            position: relative;
            width: 600px; height: 600px;
            display: flex; justify-content: center; align-items: center;
            transform-style: preserve-3d;
        }

        .center-node {
            position: relative;
            width: 340px; height: 340px;
            z-index: 50;
            transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: pulse 6s infinite ease-in-out;
        }
        .center-node img { width: 100%; height: 100%; object-fit: contain; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 35px rgba(255,255,255,0.2)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 65px rgba(255,255,255,0.5)); }
        }

        .app-node {
            position: absolute;
            width: 180px; height: 180px;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .app-node img { 
            width: 150px; height: 150px; 
            object-fit: contain; 
            filter: grayscale(1) opacity(0.6) brightness(0.9); 
            transition: 0.5s ease;
        }

        .app-node span {
            margin-top: 12px; font-size: 0.7rem; color: #666;
            letter-spacing: 4px; text-transform: uppercase;
            font-weight: 900; opacity: 0; transition: 0.4s;
        }

        .app-node:hover img { filter: grayscale(0) opacity(1) brightness(1.4); }
        .app-node:hover span { opacity: 1; color: #fff; text-shadow: 0 0 15px #fff; }

        /* DESKTOP PLACEMENT */
        .vexilla { transform: translateY(-220px); }
        .vexilla:hover img { filter: drop-shadow(0 0 70px var(--vexilla-glow)) !important; transform: scale(1.2) translateZ(60px); }

        .autopilot { transform: translateX(220px); }
        .autopilot:hover img { filter: drop-shadow(0 0 70px var(--autopilot-glow)) !important; transform: scale(1.2) translateZ(60px); }

        .scribeboard { transform: translateY(220px); }
        .scribeboard:hover img { filter: drop-shadow(0 0 70px var(--scribe-glow)) !important; transform: scale(1.2) translateZ(60px); }

        .promptmask { transform: translateX(-220px); }
        .promptmask:hover img { filter: drop-shadow(0 0 70px var(--prompt-glow)) !important; transform: scale(1.2) translateZ(60px); }

        .invest-btn {
            position: fixed;
            bottom: 40px; right: 40px;
            padding: 22px 55px;
            background: #fff;
            color: #000;
            text-decoration: none;
            font-weight: 900;
            letter-spacing: 5px;
            font-size: 0.85rem;
            text-transform: uppercase;
            border-radius: 4px;
            z-index: 100;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            transition: 0.4s;
        }
        .invest-btn:hover { background: var(--vexilla-glow); color: #fff; box-shadow: 0 0 50px var(--vexilla-glow); transform: translateY(-5px); }

        /* ------------------------------------------------------------------ */
        /* MOBILE OPTIMIZATION (ONLY APPLIES ON SMALL SCREENS) */
        /* ------------------------------------------------------------------ */
        @media (max-width: 768px) {
            header { padding: 15px 20px; flex-direction: column; gap: 15px; height: auto; }
            .brand-logo-small { width: 140px; } /* Shrink header logo for mobile */
            .nav-links { gap: 15px; }
            .nav-links a { font-size: 0.6rem; letter-spacing: 2px; }

            .stage { padding-top: 150px; } /* Push down more for the double-stacked mobile header */
            
            /* Scale down the entire orbit */
            .center-node { width: 180px; height: 180px; }
            .app-node { width: 100px; height: 100px; }
            .app-node img { width: 80px; height: 80px; }
            
            /* Tighter orbit radius for narrow screens (140px instead of 220px) */
            .vexilla { transform: translateY(-140px); }
            .autopilot { transform: translateX(140px); }
            .scribeboard { transform: translateY(140px); }
            .promptmask { transform: translateX(-140px); }

            .hud-status { display: none; } /* Clean up the screen on small devices */
            
            .invest-btn { 
                bottom: 20px; right: 50%; 
                transform: translateX(50%); 
                width: 90%; 
                padding: 15px 0; 
                text-align: center;
                font-size: 0.7rem;
            }
            .invest-btn:hover { transform: translateX(50%) translateY(-5px); }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand-box">
            <a href="https://skrs-ai.github.io/LicensingCatalog/" style="text-decoration: none;">
                <img src="SKRMG.png" class="brand-logo-small" alt="SKRMG Center">
            </a>
        </div>
        <nav class="nav-links">
            <a href="https://nehemiahbrown007.github.io/vexilla-support/index">VexillaAITS</a>
            <a href="https://skrs-ai.github.io/Vexilla-AutoPilot-UI/#investors">AutoPilot UI</a>
            <a href="https://skrs-ai.github.io/Vexilla--Scribeboard/#invest">ScribeBoard</a>
            <a href="https://skrs-ai.github.io/Vexilla-Prompt-MasK/#deploy">Prompt MasK</a>
        </nav>
    </header>

    <div class="hud-status">
        ORCHESTRATOR_ACTIVE: YES<br>
        SECURITY_PROTOCOLS: ENFORCED<br>
        INVESTOR_ACCESS: PENDING_APPROVAL
    </div>

    <main class="stage">
        <div class="orbit-wrap" id="orbit">
            <a href="https://skrs-ai.github.io/LicensingCatalog/" class="center-node">
                <img src="SKRMG.png" alt="Solomon Kin Records">
            </a>

            <a href="https://nehemiahbrown007.github.io/vexilla-support/index" class="app-node vexilla">
                <img src="logo-black.png.png" alt="VexillaAITS">
                <span>VexillaAITS</span>
            </a>

            <a href="https://skrs-ai.github.io/Vexilla-AutoPilot-UI/#investors" class="app-node autopilot">
                <img src="AutopilotUI.png" alt="AutoPilot-UI">
                <span>AutoPilot-UI</span>
            </a>

            <a href="https://skrs-ai.github.io/Vexilla--Scribeboard/#invest" class="app-node scribeboard">
                <img src="scribeboard.png" alt="Scribeboard">
                <span>Scribeboard</span>
            </a>

            <a href="https://skrs-ai.github.io/Vexilla-Prompt-MasK/#deploy" class="app-node promptmask">
                <img src="PROMPTMASK LOGO.png" alt="Prompt-MasK">
                <span>Prompt-MasK</span>
            </a>
        </div>
    </main>

    <a href="mailto:invest@vexillaaits.com" class="invest-btn">Secure Seed Round Access</a>

    <script>
        const orbit = document.getElementById('orbit');
        document.addEventListener('mousemove', (e) => {
            let xAxis = (window.innerWidth / 2 - e.pageX) / 50;
            let yAxis = (window.innerHeight / 2 - e.pageY) / 50;
            orbit.style.transform = `rotateY(${xAxis}deg) rotateX(${-yAxis}deg)`;
        });

        // Add touch/tilt support for mobile
        window.addEventListener('deviceorientation', (e) => {
            if(window.innerWidth < 768) {
                let x = e.beta / 10;
                let y = e.gamma / 10;
                orbit.style.transform = `rotateY(${y}deg) rotateX(${x}deg)`;
            }
        });
    </script>
</body>
</html>
