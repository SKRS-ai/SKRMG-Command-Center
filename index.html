<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKRMG | Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-black: #010101;
            /* CRANKED UP GLOW INTENSITY */
            --vexilla-glow: rgba(0, 123, 255, 0.9);   
            --scribe-glow: rgba(255, 69, 0, 0.9);    
            --autopilot-glow: rgba(50, 205, 50, 0.9); 
            --prompt-glow: rgba(138, 43, 226, 0.9);  
            --skrmg-glow: rgba(255, 255, 255, 0.5);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            width: 100%; height: 100%;
            background-color: var(--bg-black);
            font-family: 'Inter', sans-serif;
            color: #fff;
            overflow: hidden;
            cursor: crosshair;
        }

        header {
            position: fixed;
            top: 0; width: 100%;
            padding: 30px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(25px);
            border-bottom: 1px solid var(--glass-border);
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
        }

        .brand-box { display: flex; align-items: center; gap: 20px; }
        
        /* INCREASED HEADER LOGO SIZE */
        .brand-logo-small { width: 70px; height: auto; filter: drop-shadow(0 0 8px white); }
        .brand-name { font-weight: 900; letter-spacing: 5px; font-size: 0.9rem; }

        .nav-links { display: flex; gap: 35px; }
        .nav-links a { 
            text-decoration: none; color: #666; font-size: 0.75rem; 
            font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
            transition: 0.4s ease;
        }
        .nav-links a:hover { color: #fff; text-shadow: 0 0 15px #fff; }

        .hud-status {
            position: fixed;
            bottom: 40px; left: 40px;
            font-size: 0.7rem; color: #444;
            letter-spacing: 3px; line-height: 2.2;
            z-index: 10;
            font-family: monospace;
        }

        .stage {
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            perspective: 1500px;
            background: radial-gradient(circle at center, #0a0a0a 0%, #010101 100%);
        }

        .orbit-wrap {
            position: relative;
            width: 750px; height: 750px;
            display: flex; justify-content: center; align-items: center;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }

        /* INCREASED CENTER HUB SIZE */
        .center-node {
            position: relative;
            width: 320px; height: 320px;
            z-index: 50;
            transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: pulse 6s infinite ease-in-out;
        }
        .center-node img { width: 100%; height: 100%; object-fit: contain; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 30px rgba(255,255,255,0.2)); }
            50% { transform: scale(1.06); filter: drop-shadow(0 0 60px rgba(255,255,255,0.5)); }
        }

        /* INCREASED ORBITING LOGO SIZES */
        .app-node {
            position: absolute;
            width: 200px; height: 200px;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .app-node img { 
            width: 160px; height: 160px; 
            object-fit: contain; 
            filter: grayscale(1) opacity(0.5) brightness(0.8); 
            transition: 0.5s ease;
        }

        .app-node span {
            margin-top: 15px; font-size: 0.75rem; color: #555;
            letter-spacing: 5px; text-transform: uppercase;
            font-weight: 900; opacity: 0; transition: 0.4s;
        }

        .app-node:hover img { filter: grayscale(0) opacity(1) brightness(1.3); }
        .app-node:hover span { opacity: 1; color: #fff; text-shadow: 0 0 15px rgba(255,255,255,0.7); }

        /* INCREASED RADIAL DISTANCE FOR LARGER LOGOS */
        .vexilla { transform: translateY(-340px); }
        .vexilla:hover img { filter: drop-shadow(0 0 60px var(--vexilla-glow)) !important; transform: scale(1.2) translateZ(80px); }

        .autopilot { transform: translateX(340px); }
        .autopilot:hover img { filter: drop-shadow(0 0 60px var(--autopilot-glow)) !important; transform: scale(1.2) translateZ(80px); }

        .scribeboard { transform: translateY(340px); }
        .scribeboard:hover img { filter: drop-shadow(0 0 60px var(--scribe-glow)) !important; transform: scale(1.2) translateZ(80px); }

        .promptmask { transform: translateX(-340px); }
        .promptmask:hover img { filter: drop-shadow(0 0 60px var(--prompt-glow)) !important; transform: scale(1.2) translateZ(80px); }

        .invest-btn {
            position: fixed;
            bottom: 40px; right: 40px;
            padding: 22px 55px;
            background: #fff;
            color: #000;
            text-decoration: none;
            font-weight: 900;
            letter-spacing: 5px;
            font-size: 0.8rem;
            text-transform: uppercase;
            border-radius: 4px;
            transition: 0.4s;
            z-index: 100;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }
        .invest-btn:hover { background: var(--vexilla-glow); color: #fff; box-shadow: 0 0 60px var(--vexilla-glow); transform: translateY(-5px); }

    </style>
</head>
<body>

    <header>
        <div class="brand-box">
            <img src="SKRMG.png" class="brand-logo-small" alt="SKRMG Center">
            <div class="brand-name">SKRMG COMMAND</div>
        </div>
        <nav class="nav-links">
            <a href="https://vexillaaits.com">Vexilla</a>
            <a href="#">Autopilot UI</a>
            <a href="#">ScribeBoard</a>
            <a href="#">Prompt Mask</a>
        </nav>
    </header>

    <div class="hud-status">
        SYSTEM: SOLOMON_KIN_ORCHESTRATOR<br>
        STATUS: ONLINE<br>
        NODES_DETECTED: 04<br>
        VISUAL_SCALE: MAX
    </div>

    <main class="stage">
        <div class="orbit-wrap" id="orbit">
            <div class="center-node">
                <img src="SKRMG.png" alt="Solomon Kin Records Media Group">
            </div>

            <a href="https://vexillaaits.com" class="app-node vexilla">
                <img src="logo-black.png.png" alt="Vexilla AITS">
                <span>Vexilla AITS</span>
            </a>

            <a href="#" class="app-node autopilot">
                <img src="AutopilotUI.png" alt="Autopilot UI">
                <span>Autopilot UI</span>
            </a>

            <a href="#" class="app-node scribeboard">
                <img src="scribeboard.png" alt="ScribeBoard">
                <span>ScribeBoard</span>
            </a>

            <a href="#" class="app-node promptmask">
                <img src="PROMPTMASK LOGO.png" alt="Prompt Mask">
                <span>Prompt Mask</span>
            </a>
        </div>
    </main>

    <a href="mailto:invest@vexillaaits.com" class="invest-btn">Secure Investment Portal</a>

    <script>
        const orbit = document.getElementById('orbit');
        document.addEventListener('mousemove', (e) => {
            let xAxis = (window.innerWidth / 2 - e.pageX) / 40;
            let yAxis = (window.innerHeight / 2 - e.pageY) / 40;
            orbit.style.transform = `rotateY(${xAxis}deg) rotateX(${-yAxis}deg)`;
        });

        window.addEventListener('deviceorientation', (e) => {
            if(window.innerWidth < 768) {
                let x = e.beta / 5;
                let y = e.gamma / 5;
                orbit.style.transform = `rotateY(${y}deg) rotateX(${x}deg)`;
            }
        });
    </script>
</body>
</html>
