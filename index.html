<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKRMG Command Center | The Future of Utility</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-black: #020202;
            --accent-blue: #007bff;
            --vexilla-glow: rgba(0, 123, 255, 0.6);
            --scribe-glow: rgba(255, 69, 0, 0.6);
            --autopilot-glow: rgba(50, 205, 50, 0.6);
            --prompt-glow: rgba(138, 43, 226, 0.6);
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            width: 100%; height: 100%;
            background-color: var(--bg-black);
            font-family: 'Inter', sans-serif;
            color: #fff;
            overflow: hidden;
            cursor: crosshair;
        }

        /* NEURAL BACKGROUND */
        #canvas-bg {
            position: fixed;
            top: 0; left: 0; z-index: 0;
            opacity: 0.4;
        }

        /* HIGH-END HEADER */
        header {
            position: fixed;
            top: 0; width: 100%;
            padding: 25px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }

        .brand-box { display: flex; align-items: center; gap: 15px; }
        .brand-logo-small { width: 35px; height: 35px; }
        .brand-name { font-weight: 900; letter-spacing: 4px; font-size: 0.9rem; }

        .nav-links { display: flex; gap: 30px; }
        .nav-links a { 
            text-decoration: none; color: #888; font-size: 0.7rem; 
            font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
            transition: 0.3s;
        }
        .nav-links a:hover { color: #fff; text-shadow: 0 0 10px #fff; }

        /* HUD ELEMENTS */
        .hud-corner {
            position: fixed;
            bottom: 30px; left: 40px;
            font-size: 0.6rem; color: #444;
            letter-spacing: 2px; line-height: 2;
            z-index: 10;
        }

        /* THE CORE ECOSYSTEM */
        .stage {
            position: relative;
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            perspective: 1000px;
            z-index: 5;
        }

        .orbit-wrap {
            position: relative;
            width: 500px; height: 500px;
            display: flex; justify-content: center; align-items: center;
        }

        /* CENTRAL HEARTBEAT */
        .center-node {
            position: relative;
            width: 220px; height: 220px;
            z-index: 20;
            cursor: pointer;
            animation: heartbeat 4s infinite ease-in-out;
            transition: 0.5s;
        }
        .center-node img { width: 100%; height: 100%; object-fit: contain; }
        .center-node:hover { transform: scale(1.05); filter: brightness(1.3); }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(255,255,255,0.1)); }
            50% { transform: scale(1.03); filter: drop-shadow(0 0 40px rgba(255,255,255,0.3)); }
        }

        /* ORBITING APPS */
        .app-node {
            position: absolute;
            width: 110px; height: 110px;
            display: flex; flex-direction: column; align-items: center;
            text-decoration: none;
            transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .app-node img { 
            width: 85px; height: 85px; 
            object-fit: contain; 
            filter: grayscale(0.5); 
            transition: 0.5s;
        }

        .app-node span {
            margin-top: 15px; font-size: 0.65rem; color: #666;
            letter-spacing: 3px; text-transform: uppercase;
            font-weight: 800; opacity: 0; transition: 0.4s;
        }

        .app-node:hover img { filter: grayscale(0) brightness(1.2); }
        .app-node:hover span { opacity: 1; color: #fff; }

        /* POSITIONING & CUSTOM GLOWS */
        .vexilla { transform: translateY(-260px); }
        .vexilla:hover img { filter: drop-shadow(0 0 35px var(--vexilla-glow)); }

        .autopilot { transform: translateX(260px); }
        .autopilot:hover img { filter: drop-shadow(0 0 35px var(--autopilot-glow)); }

        .scribeboard { transform: translateY(260px); }
        .scribeboard:hover img { filter: drop-shadow(0 0 35px var(--scribe-glow)); }

        .promptmask { transform: translateX(-260px); }
        .promptmask:hover img { filter: drop-shadow(0 0 35px var(--prompt-glow)); }

        /* CALL TO ACTION */
        .invest-cta {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 40px;
            background: #fff;
            color: #000;
            text-decoration: none;
            font-weight: 900;
            letter-spacing: 4px;
            font-size: 0.8rem;
            text-transform: uppercase;
            border-radius: 5px;
            transition: 0.4s;
        }
        .invest-cta:hover { background: var(--accent-blue); color: #fff; box-shadow: 0 0 30px var(--accent-blue); }

    </style>
</head>
<body>

    <header>
        <div class="brand-box">
            <img src="SKRMG.png" class="brand-logo-small" alt="SKRMG">
            <div class="brand-name">COMMAND CENTER</div>
        </div>
        <nav class="nav-links">
            <a href="https://vexillaaits.com">Vexilla</a>
            <a href="#">Autopilot UI</a>
            <a href="#">ScribeBoard</a>
            <a href="#">PromptMask</a>
        </nav>
        <div class="brand-name" style="font-size: 0.6rem; color: #444;">V.1.0_PROTOTYPE</div>
    </header>

    <div class="hud-corner">
        CORE_STATUS: OPERATIONAL<br>
        NODES_ACTIVE: 04<br>
        ENCRYPTION: AES-256<br>
        ECOSYSTEM: SKRMG_UTILITY_SUITE
    </div>

    <main class="stage">
        <div class="orbit-wrap" id="orbit">
            <div class="center-node">
                <img src="SKRMG.png" alt="Solomon Kin Records Media Group">
            </div>

            <a href="https://vexillaaits.com" class="app-node vexilla">
                <img src="vexilla Logo.png" alt="Vexilla">
                <span>Vexilla AITS</span>
            </a>

            <a href="#" class="app-node autopilot">
                <img src="AutopilotUI.png" alt="Autopilot UI">
                <span>Autopilot UI</span>
            </a>

            <a href="#" class="app-node scribeboard">
                <img src="scribeboard.png" alt="ScribeBoard">
                <span>ScribeBoard</span>
            </a>

            <a href="#" class="app-node promptmask">
                <img src="PROMPTMASK LOGO.png" alt="PromptMask">
                <span>PromptMask</span>
            </a>
        </div>
    </main>

    <a href="mailto:invest@vexillaaits.com" class="invest-cta">Pitch Deck Access</a>

    <script>
        // MOUSE PARALLAX EFFECT FOR INVESTOR ENGAGEMENT
        const stage = document.querySelector('.stage');
        const orbit = document.getElementById('orbit');

        stage.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 25;
            const y = (window.innerHeight / 2 - e.pageY) / 25;
            orbit.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
        });
    </script>
</body>
</html>
