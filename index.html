<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKRMG | Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-black: #010101;
            --vexilla-glow: rgba(0, 123, 255, 0.9);   
            --scribe-glow: rgba(255, 69, 0, 0.9);    
            --autopilot-glow: rgba(50, 205, 50, 0.9); 
            --prompt-glow: rgba(138, 43, 226, 0.9);  
            --skrmg-glow: rgba(255, 255, 255, 0.5);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            width: 100%; height: 100%;
            background-color: var(--bg-black);
            font-family: 'Inter', sans-serif;
            color: #fff;
            overflow: hidden;
            cursor: crosshair;
        }

        header {
            position: fixed;
            top: 0; width: 100%;
            padding: 20px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(25px);
            border-bottom: 1px solid var(--glass-border);
            background: rgba(0,0,0,0.8);
        }

        .brand-box { display: flex; align-items: center; }
        
        /* HEADER LOGO TRIPLED (210px) */
        .brand-logo-small { width: 210px; height: auto; filter: drop-shadow(0 0 15px white); transition: 0.3s; }
        .brand-logo-small:hover { transform: scale(1.02); }

        .nav-links { display: flex; gap: 35px; }
        .nav-links a { 
            text-decoration: none; color: #888; font-size: 0.8rem; 
            font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
            transition: 0.4s ease;
        }
        .nav-links a:hover { color: #fff; text-shadow: 0 0 15px #fff; }

        /* STAGE: Adjusted centering to clear high header */
        .stage {
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            perspective: 1500px;
            background: radial-gradient(circle at center, #0a0a0a 0%, #010101 100%);
            padding-top: 120px; /* Moves the whole cluster down */
        }

        .orbit-wrap {
            position: relative;
            width: 500px; height: 500px;
            display: flex; justify-content: center; align-items: center;
            transform-style: preserve-3d;
        }

        /* CENTER HUB */
        .center-node {
            position: relative;
            width: 280px; height: 280px;
            z-index: 50;
            transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: pulse 6s infinite ease-in-out;
        }
        .center-node img { width: 100%; height: 100%; object-fit: contain; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 30px rgba(255,255,255,0.2)); }
            50% { transform: scale(1.04); filter: drop-shadow(0 0 50px rgba(255,255,255,0.4)); }
        }

        /* SATELLITE NODES */
        .app-node {
            position: absolute;
            width: 160px; height: 160px;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .app-node img { 
            width: 130px; height: 130px; 
            object-fit: contain; 
            filter: grayscale(1) opacity(0.6) brightness(0.8); 
            transition: 0.5s ease;
        }

        .app-node span {
            margin-top: 10px; font-size: 0.7rem; color: #555;
            letter-spacing: 4px; text-transform: uppercase;
            font-weight: 900; opacity: 0; transition: 0.4s;
        }

        .app-node:hover img { filter: grayscale(0) opacity(1) brightness(1.3); }
        .app-node:hover span { opacity: 1; color: #fff; text-shadow: 0 0 15px rgba(255,255,255,0.7); }

        /* TIGHT ORBIT PLACEMENT (Reduced distance to 210px) */
        .vexilla { transform: translateY(-210px); }
        .vexilla:hover img { filter: drop-shadow(0 0 60px var(--vexilla-glow)) !important; transform: scale(1.15) translateZ(50px); }

        .autopilot { transform: translateX(210px); }
        .autopilot:hover img { filter: drop-shadow(0 0 60px var(--autopilot-glow)) !important; transform: scale(1.15) translateZ(50px); }

        .scribeboard { transform: translateY(210px); }
        .scribeboard:hover img { filter: drop-shadow(0 0 60px var(--scribe-glow)) !important; transform: scale(1.15) translateZ(50px); }

        .promptmask { transform: translateX(-210px); }
        .promptmask:hover img { filter: drop-shadow(0 0 60px var(--prompt-glow)) !important; transform: scale(1.15) translateZ(50px); }

        .invest-btn {
            position: fixed;
            bottom: 30px; right: 30px;
            padding: 18px 40px;
            background: #fff;
            color: #000;
            text-decoration: none;
            font-weight: 900;
            letter-spacing: 4px;
            font-size: 0.75rem;
            text-transform: uppercase;
            border-radius: 4px;
            z-index: 100;
        }
        .invest-btn:hover { background: var(--vexilla-glow); color: #fff; box-shadow: 0 0 40px var(--vexilla-glow); }

    </style>
</head>
<body>

    <header>
        <div class="brand-box">
            <a href="https://skrs-ai.github.io/LicensingCatalog/" style="text-decoration: none; display: flex; align-items: center;">
                <img src="SKRMG.png" class="brand-logo-small" alt="Solomon Kin Records | Studio & Production Portal">
            </a>
        </div>
        <nav class="nav-links">
            <a href="https://nehemiahbrown007.github.io/vexilla-support/index">Vexilla</a>
            <a href="https://skrs-ai.github.io/Vexilla-AutoPilot-UI/#investors">Autopilot UI</a>
            <a href="https://skrs-ai.github.io/Vexilla--Scribeboard/#invest">ScribeBoard</a>
            <a href="https://skrs-ai.github.io/Vexilla-Prompt-MasK/#deploy">Prompt Mask</a>
        </nav>
    </header>

    <main class="stage">
        <div class="orbit-wrap" id="orbit">
            
            <a href="https://skrs-ai.github.io/LicensingCatalog/" class="center-node">
                <img src="SKRMG.png" alt="Solomon Kin Records Media Group">
            </a>

            <a href="https://nehemiahbrown007.github.io/vexilla-support/index" class="app-node vexilla">
                <img src="logo-black.png" alt="Vexilla AITS">
                <span>Vexilla AITS</span>
            </a>

            <a href="https://skrs-ai.github.io/Vexilla-AutoPilot-UI/#investors" class="app-node autopilot">
                <img src="AutopilotUI.png" alt="Autopilot UI">
                <span>AutoPilot-UI</span>
            </a>

            <a href="https://skrs-ai.github.io/Vexilla--Scribeboard/#invest" class="app-node scribeboard">
                <img src="scribeboard.png" alt="ScribeBoard">
                <span>Scribeboard</span>
            </a>

            <a href="https://skrs-ai.github.io/Vexilla-Prompt-MasK/#deploy" class="app-node promptmask">
                <img src="PROMPTMASK LOGO.png" alt="Prompt Mask">
                <span>Prompt-MasK</span>
            </a>
        </div>
    </main>

    <a href="mailto:invest@vexillaaits.com" class="invest-btn">Secure Access</a>

    <script>
        const orbit = document.getElementById('orbit');
        document.addEventListener('mousemove', (e) => {
            let xAxis = (window.innerWidth / 2 - e.pageX) / 45;
            let yAxis = (window.innerHeight / 2 - e.pageY) / 45;
            orbit.style.transform = `rotateY(${xAxis}deg) rotateX(${-yAxis}deg)`;
        });
    </script>
</body>
</html>
